<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7c3aed">
    <title>Lako Vendor - Manage Your Micro-Retail Business</title>
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        /* Main App Container */
        .app-container {
            min-height: 100vh;
            background: #f3f4f6;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 12px;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: #7c3aed;
        }

        .nav-icon {
            font-size: 24px;
        }

        /* Dashboard Cards */
        .dashboard-container {
            padding: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #7c3aed;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        canvas {
            max-height: 200px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 12px;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            color: #7c3aed;
            font-weight: bold;
        }

        .product-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #6b7280;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #9ca3af;
        }

        /* Reviews List */
        .reviews-list {
            padding: 16px;
        }

        .review-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .review-customer {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .review-rating {
            color: #fbbf24;
            margin-bottom: 8px;
        }

        .review-comment {
            font-size: 14px;
            color: #4b5563;
        }

        .review-date {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
        }

        /* Inquiries List */
        .inquiries-list {
            padding: 16px;
        }

        .inquiry-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .inquiry-customer {
            font-weight: 600;
        }

        .inquiry-message {
            font-size: 14px;
            color: #4b5563;
            margin: 8px 0;
        }

        .inquiry-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-responded {
            background: #dcfce7;
            color: #16a34a;
        }

        /* Form Row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: #f3e8ff;
            color: #7c3aed;
            border-radius: 20px;
            font-size: 11px;
            margin-right: 4px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let currentVendor = null;
        let currentPage = 'dashboard';
        let products = [];
        let reviews = [];
        let inquiries = [];
        let chartInstance = null;
        
        // Sample data
        const sampleProducts = [
            { id: 1, name: "Spicy Siomai", price: 25, category: "Dimsum", views: 156, sales: 89 },
            { id: 2, name: "Fishball (10pcs)", price: 15, category: "Street Food", views: 234, sales: 145 },
            { id: 3, name: "Kikiam (5pcs)", price: 20, category: "Street Food", views: 189, sales: 112 },
            { id: 4, name: "Turon (Banana)", price: 15, category: "Snacks", views: 98, sales: 67 }
        ];
        
        const sampleReviews = [
            { id: 1, customer: "Juan Dela Cruz", rating: 5, comment: "Best siomai in town!", date: "2025-03-15" },
            { id: 2, customer: "Maria Santos", rating: 4, comment: "Fishball is great, sauce could be better", date: "2025-03-14" },
            { id: 3, customer: "Pedro Reyes", rating: 5, comment: "Very affordable and tasty!", date: "2025-03-12" }
        ];
        
        const sampleInquiries = [
            { id: 1, customer: "Anna Lopez", message: "Do you deliver?", status: "pending", date: "2025-03-15" },
            { id: 2, customer: "Carlos Mendoza", message: "What time do you open?", status: "responded", date: "2025-03-14" }
        ];

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        function saveVendor(vendor) {
            currentVendor = vendor;
            localStorage.setItem('lako_vendor', JSON.stringify(vendor));
        }

        function loadVendor() {
            const saved = localStorage.getItem('lako_vendor');
            if (saved) {
                currentVendor = JSON.parse(saved);
                loadProducts();
                loadReviews();
                loadInquiries();
            }
        }

        function logout() {
            currentVendor = null;
            localStorage.removeItem('lako_vendor');
            render();
        }

        function loadProducts() {
            products = sampleProducts;
        }

        function loadReviews() {
            reviews = sampleReviews;
        }

        function loadInquiries() {
            inquiries = sampleInquiries;
        }

        function addProduct(name, price, category) {
            const newProduct = {
                id: products.length + 1,
                name: name,
                price: parseFloat(price),
                category: category,
                views: 0,
                sales: 0
            };
            products.push(newProduct);
            renderPage();
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            renderPage();
        }

        function respondToInquiry(id, response) {
            const inquiry = inquiries.find(i => i.id === id);
            if (inquiry) {
                inquiry.status = "responded";
                inquiry.response = response;
            }
            renderPage();
        }

        // ============================================
        // PAGE RENDERING
        // ============================================
        
        function renderDashboard() {
            const totalProducts = products.length;
            const totalSales = products.reduce((sum, p) => sum + p.sales, 0);
            const totalViews = products.reduce((sum, p) => sum + p.views, 0);
            const avgRating = (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1);
            
            setTimeout(() => {
                const ctx = document.getElementById('trafficChart')?.getContext('2d');
                if (ctx) {
                    if (chartInstance) chartInstance.destroy();
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Views',
                                data: [45, 62, 78, 55, 89, 102, 94],
                                borderColor: '#7c3aed',
                                backgroundColor: 'rgba(124, 58, 237, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
            }, 100);
            
            return `
                <div class="dashboard-container">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${totalProducts}</div>
                            <div class="stat-label">Products</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${totalSales}</div>
                            <div class="stat-label">Total Sales</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${totalViews}</div>
                            <div class="stat-label">Total Views</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${avgRating}</div>
                            <div class="stat-label">Avg Rating</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <div class="chart-title">📊 Weekly Traffic</div>
                        <canvas id="trafficChart"></canvas>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${reviews.length}</div>
                            <div class="stat-label">Reviews</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${inquiries.length}</div>
                            <div class="stat-label">Inquiries</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCatalog() {
            return `
                <div>
                    <div style="padding: 16px;">
                        <button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>
                    </div>
                    <div class="products-grid">
                        ${products.map(product => `
                            <div class="product-card">
                                <div class="product-image">🍽️</div>
                                <div class="product-name">${product.name}</div>
                                <div class="product-price">₱${product.price}</div>
                                <div class="product-stats">
                                    <span>👁️ ${product.views}</span>
                                    <span>🛒 ${product.sales}</span>
                                </div>
                                <button class="btn btn-secondary" style="margin-top: 8px; font-size: 12px;" onclick="deleteProduct(${product.id})">Delete</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderReviews() {
            return `
                <div class="reviews-list">
                    ${reviews.map(review => `
                        <div class="review-card">
                            <div class="review-customer">${review.customer}</div>
                            <div class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                            <div class="review-comment">"${review.comment}"</div>
                            <div class="review-date">${review.date}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderInquiries() {
            return `
                <div class="inquiries-list">
                    ${inquiries.map(inquiry => `
                        <div class="inquiry-card">
                            <div class="inquiry-customer">${inquiry.customer}</div>
                            <div class="inquiry-message">"${inquiry.message}"</div>
                            <div class="inquiry-date" style="font-size: 11px; color: #9ca3af; margin-bottom: 8px;">${inquiry.date}</div>
                            <span class="inquiry-status status-${inquiry.status}">${inquiry.status.toUpperCase()}</span>
                            ${inquiry.status === 'pending' ? `
                                <button class="btn btn-primary" style="margin-top: 12px; font-size: 12px;" onclick="showRespondModal(${inquiry.id})">Respond</button>
                            ` : `
                                <div style="margin-top: 8px; padding: 8px; background: #f3f4f6; border-radius: 8px; font-size: 13px;">
                                    <strong>Your response:</strong> ${inquiry.response || 'Thanks for reaching out!'}
                                </div>
                            `}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProfile() {
            const vendor = currentVendor || { businessName: 'My Store', email: 'vendor@example.com', phone: '09123456789' };
            return `
                <div class="dashboard-container">
                    <div class="stat-card" style="text-align: left;">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px;">🏪</div>
                            <div>
                                <h3>${vendor.businessName}</h3>
                                <p style="color: #6b7280; font-size: 14px;">${vendor.email}</p>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Business Name</label>
                            <input type="text" id="profile-business-name" value="${vendor.businessName}">
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <input type="tel" id="profile-phone" value="${vendor.phone || ''}">
                        </div>
                        <div class="input-group">
                            <label>Address</label>
                            <textarea id="profile-address" rows="2">${vendor.address || ''}</textarea>
                        </div>
                        <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // MODALS
        // ============================================
        
        window.showAddProductModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Add Product</h3>
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="product-name" placeholder="e.g., Spicy Siomai">
                    </div>
                    <div class="input-group">
                        <label>Price (₱)</label>
                        <input type="number" id="product-price" placeholder="25">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="product-category">
                            <option value="Street Food">Street Food</option>
                            <option value="Dimsum">Dimsum</option>
                            <option value="Snacks">Snacks</option>
                            <option value="Rice Meals">Rice Meals</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="addProductFromModal()">Add Product</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.addProductFromModal = function() {
            const name = document.getElementById('product-name').value;
            const price = document.getElementById('product-price').value;
            const category = document.getElementById('product-category').value;
            
            if (name && price) {
                addProduct(name, price, category);
                document.querySelector('.modal-overlay').remove();
            }
        };

        window.showRespondModal = function(inquiryId) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Respond to Customer</h3>
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    <div class="input-group">
                        <label>Your Response</label>
                        <textarea id="response-text" rows="3" placeholder="Type your response here..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="sendResponse(${inquiryId})">Send Response</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.sendResponse = function(inquiryId) {
            const response = document.getElementById('response-text').value;
            if (response) {
                respondToInquiry(inquiryId, response);
                document.querySelector('.modal-overlay').remove();
            }
        };

        window.updateProfile = function() {
            const businessName = document.getElementById('profile-business-name')?.value;
            const phone = document.getElementById('profile-phone')?.value;
            const address = document.getElementById('profile-address')?.value;
            
            if (currentVendor) {
                currentVendor.businessName = businessName;
                currentVendor.phone = phone;
                currentVendor.address = address;
                saveVendor(currentVendor);
            }
            renderPage();
        };

        // ============================================
        // PAGE MANAGEMENT
        // ============================================
        
        function renderPage() {
            const container = document.getElementById('page-content');
            if (!container) return;
            
            if (currentPage === 'dashboard') {
                container.innerHTML = renderDashboard();
            } else if (currentPage === 'catalog') {
                container.innerHTML = renderCatalog();
            } else if (currentPage === 'reviews') {
                container.innerHTML = renderReviews();
            } else if (currentPage === 'inquiries') {
                container.innerHTML = renderInquiries();
            } else if (currentPage === 'profile') {
                container.innerHTML = renderProfile();
            }
        }

        function changePage(page) {
            currentPage = page;
            renderPage();
            
            // Update active nav state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-page') === page) {
                    item.classList.add('active');
                }
            });
        }

        // ============================================
        // MAIN APP RENDER
        // ============================================
        
        function renderMainApp() {
            return `
                <div class="app-container">
                    <div class="header">
                        <div class="logo">Lako Vendor</div>
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                    <div id="page-content"></div>
                    <div class="bottom-nav">
                        <button class="nav-item ${currentPage === 'dashboard' ? 'active' : ''}" data-page="dashboard" onclick="changePage('dashboard')">
                            <span class="nav-icon">📊</span>
                            <span>Dashboard</span>
                        </button>
                        <button class="nav-item ${currentPage === 'catalog' ? 'active' : ''}" data-page="catalog" onclick="changePage('catalog')">
                            <span class="nav-icon">📦</span>
                            <span>Catalog</span>
                        </button>
                        <button class="nav-item ${currentPage === 'reviews' ? 'active' : ''}" data-page="reviews" onclick="changePage('reviews')">
                            <span class="nav-icon">⭐</span>
                            <span>Reviews</span>
                        </button>
                        <button class="nav-item ${currentPage === 'inquiries' ? 'active' : ''}" data-page="inquiries" onclick="changePage('inquiries')">
                            <span class="nav-icon">💬</span>
                            <span>Inbox</span>
                        </button>
                        <button class="nav-item ${currentPage === 'profile' ? 'active' : ''}" data-page="profile" onclick="changePage('profile')">
                            <span class="nav-icon">👤</span>
                            <span>Profile</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // AUTH PAGES
        // ============================================
        
        function renderLogin() {
            return `
                <div class="auth-container">
                    <div class="auth-card">
                        <h1 class="auth-title">Lako Vendor</h1>
                        <p class="auth-subtitle">Manage Your Business</p>
                        <div id="login-error" class="error-message hidden"></div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="login-email" placeholder="vendor@example.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="login-password" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
                        <button class="btn btn-secondary" onclick="showRegister()">Register Business</button>
                    </div>
                </div>
            `;
        }

        function renderRegister() {
            return `
                <div class="auth-container">
                    <div class="auth-card">
                        <h1 class="auth-title">Register Business</h1>
                        <p class="auth-subtitle">Join Lako as a vendor</p>
                        <div id="register-error" class="error-message hidden"></div>
                        <div class="input-group">
                            <label>Business Name</label>
                            <input type="text" id="register-business" placeholder="My Store">
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="register-email" placeholder="vendor@example.com">
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <input type="tel" id="register-phone" placeholder="09123456789">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="register-password" placeholder="••••••••">
                        </div>
                        <div class="input-group">
                            <label>Confirm Password</label>
                            <input type="password" id="register-confirm" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="handleRegister()">Register</button>
                        <button class="btn btn-secondary" onclick="showLogin()">Back to Login</button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // AUTH HANDLERS
        // ============================================
        
        window.handleLogin = function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            saveVendor({ 
                id: 1, 
                businessName: email.split('@')[0] + "'s Store", 
                email: email 
            });
            loadProducts();
            loadReviews();
            loadInquiries();
            render();
        };

        window.handleRegister = function() {
            const businessName = document.getElementById('register-business').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const errorDiv = document.getElementById('register-error');
            
            if (!businessName || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            saveVendor({ id: 1, businessName: businessName, email: email, phone: phone });
            loadProducts();
            loadReviews();
            loadInquiries();
            render();
        };

        window.showLogin = function() {
            render();
        };

        window.showRegister = function() {
            const app = document.getElementById('app');
            app.innerHTML = renderRegister();
        };

        // ============================================
        // MAIN RENDER
        // ============================================
        
        function render() {
            const app = document.getElementById('app');
            
            if (currentVendor) {
                app.innerHTML = renderMainApp();
                renderPage();
            } else {
                app.innerHTML = renderLogin();
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        
        loadVendor();
        render();
    </script>
</body>
</html>
