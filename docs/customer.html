<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>Lako - GPS Proximity Discovery of Micro-Retail Vendors</title>
    
    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        /* Main App Container */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        /* Map Container */
        #map {
            flex: 1;
            margin-top: 60px;
            margin-bottom: 60px;
            z-index: 1;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 12px;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: #7c3aed;
        }

        .nav-icon {
            font-size: 24px;
        }

        /* Feed Page */
        .feed-container {
            margin-top: 60px;
            margin-bottom: 60px;
            padding: 16px;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }

        .vendor-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .vendor-card:hover {
            transform: translateY(-2px);
        }

        .vendor-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .vendor-category {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
        }

        .vendor-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .stars {
            color: #fbbf24;
            font-size: 14px;
        }

        .distance {
            font-size: 12px;
            color: #9ca3af;
        }

        /* Profile Page */
        .profile-container {
            margin-top: 60px;
            margin-bottom: 60px;
            padding: 16px;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-email {
            color: #6b7280;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #7c3aed;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        /* Vendor Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #9ca3af;
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Leaflet JavaScript for OpenStreetMap -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let currentUser = null;
        let currentLocation = null;
        let currentPage = 'map';
        let mapInstance = null;
        let vendors = [
            { id: 1, name: "Kuya's BBQ", category: "Street Foods", rating: 4.5, lat: 14.6760, lng: 121.0437, distance: 0.5 },
            { id: 2, name: "Aling Nena's Siomai", category: "Dimsum", rating: 4.8, lat: 14.6770, lng: 121.0440, distance: 0.8 },
            { id: 3, name: "Turon ni Manong", category: "Snacks", rating: 4.2, lat: 14.6750, lng: 121.0425, distance: 0.3 },
            { id: 4, name: "Fishball Station", category: "Street Foods", rating: 4.0, lat: 14.6780, lng: 121.0450, distance: 1.2 },
            { id: 5, name: "Sari-sari Store", category: "Convenience", rating: 4.3, lat: 14.6745, lng: 121.0430, distance: 0.4 }
        ];

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        function saveUser(user) {
            currentUser = user;
            localStorage.setItem('lako_user', JSON.stringify(user));
        }

        function loadUser() {
            const saved = localStorage.getItem('lako_user');
            if (saved) {
                currentUser = JSON.parse(saved);
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('lako_user');
            render();
        }

        // Get user location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        if (mapInstance) {
                            mapInstance.setView([currentLocation.lat, currentLocation.lng], 15);
                            L.marker([currentLocation.lat, currentLocation.lng])
                                .addTo(mapInstance)
                                .bindPopup('You are here')
                                .openPopup();
                        }
                        renderMap();
                    },
                    (error) => {
                        console.error('Location error:', error);
                        currentLocation = { lat: 14.6760, lng: 121.0437 };
                        renderMap();
                    }
                );
            } else {
                currentLocation = { lat: 14.6760, lng: 121.0437 };
                renderMap();
            }
        }

        // Calculate distance
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Update vendor distances
        function updateVendorDistances() {
            if (currentLocation) {
                vendors = vendors.map(v => ({
                    ...v,
                    distance: calculateDistance(currentLocation.lat, currentLocation.lng, v.lat, v.lng)
                }));
                vendors.sort((a, b) => a.distance - b.distance);
            }
        }

        // ============================================
        // MAP FUNCTIONS
        // ============================================
        
        function renderMap() {
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;
            
            if (mapInstance) {
                mapInstance.remove();
            }
            
            const center = currentLocation || { lat: 14.6760, lng: 121.0437 };
            
            mapInstance = L.map('map').setView([center.lat, center.lng], 15);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(mapInstance);
            
            if (currentLocation) {
                L.marker([currentLocation.lat, currentLocation.lng])
                    .addTo(mapInstance)
                    .bindPopup('<b>You are here</b>')
                    .openPopup();
            }
            
            // Add vendor markers
            vendors.forEach(vendor => {
                const marker = L.marker([vendor.lat, vendor.lng]).addTo(mapInstance);
                marker.bindPopup(`
                    <b>${vendor.name}</b><br>
                    ${vendor.category}<br>
                    ⭐ ${vendor.rating}<br>
                    📍 ${vendor.distance.toFixed(1)} km away<br>
                    <button onclick="showVendorModal(${vendor.id})">View Details</button>
                `);
            });
        }

        // ============================================
        // PAGE RENDERING
        // ============================================
        
        function showVendorModal(vendorId) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (!vendor) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>${vendor.name}</h3>
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    </div>
                    <p><strong>Category:</strong> ${vendor.category}</p>
                    <p><strong>Rating:</strong> ⭐ ${vendor.rating}</p>
                    <p><strong>Distance:</strong> ${vendor.distance.toFixed(1)} km away</p>
                    <button class="btn btn-primary" style="margin-top: 16px;" onclick="alert('Directions to ${vendor.name}')">Get Directions</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function renderFeed() {
            updateVendorDistances();
            
            return `
                <div class="feed-container">
                    <h2 style="margin-bottom: 16px;">Nearby Vendors</h2>
                    ${vendors.map(vendor => `
                        <div class="vendor-card" onclick="showVendorModal(${vendor.id})">
                            <div class="vendor-name">${vendor.name}</div>
                            <div class="vendor-category">${vendor.category}</div>
                            <div class="vendor-rating">
                                <span class="stars">${'★'.repeat(Math.floor(vendor.rating))}${'☆'.repeat(5-Math.floor(vendor.rating))}</span>
                                <span class="distance">📍 ${vendor.distance.toFixed(1)} km</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProfile() {
            const user = currentUser || { name: 'Guest User', email: 'guest@example.com' };
            return `
                <div class="profile-container">
                    <div class="profile-card">
                        <div class="avatar">👤</div>
                        <div class="profile-name">${user.name}</div>
                        <div class="profile-email">${user.email}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${vendors.length}</div>
                            <div class="stat-label">Nearby</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">12</div>
                            <div class="stat-label">Reviews</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">5</div>
                            <div class="stat-label">Saved</div>
                        </div>
                    </div>
                    <div class="menu-item" onclick="alert('Edit Profile')">
                        <span>✏️ Edit Profile</span>
                        <span>→</span>
                    </div>
                    <div class="menu-item" onclick="alert('Notification Settings')">
                        <span>🔔 Notifications</span>
                        <span>→</span>
                    </div>
                    <div class="menu-item" onclick="alert('Privacy Settings')">
                        <span>🔒 Privacy</span>
                        <span>→</span>
                    </div>
                </div>
            `;
        }

        function renderMapPage() {
            return `
                <div id="map" style="flex:1; margin-top:60px; margin-bottom:60px;"></div>
            `;
        }

        function renderMainApp() {
            let content = '';
            
            if (currentPage === 'map') {
                content = renderMapPage();
                setTimeout(() => {
                    if (mapInstance) {
                        mapInstance.invalidateSize();
                    } else {
                        renderMap();
                    }
                }, 100);
            } else if (currentPage === 'feed') {
                content = renderFeed();
            } else if (currentPage === 'profile') {
                content = renderProfile();
            }
            
            return `
                <div class="app-container">
                    <div class="header">
                        <div class="logo">Lako</div>
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                    ${content}
                    <div class="bottom-nav">
                        <button class="nav-item ${currentPage === 'map' ? 'active' : ''}" onclick="changePage('map')">
                            <span class="nav-icon">🗺️</span>
                            <span>Map</span>
                        </button>
                        <button class="nav-item ${currentPage === 'feed' ? 'active' : ''}" onclick="changePage('feed')">
                            <span class="nav-icon">📰</span>
                            <span>Feed</span>
                        </button>
                        <button class="nav-item ${currentPage === 'profile' ? 'active' : ''}" onclick="changePage('profile')">
                            <span class="nav-icon">👤</span>
                            <span>Profile</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // AUTH PAGES
        // ============================================
        
        function renderLogin() {
            return `
                <div class="auth-container">
                    <div class="auth-card">
                        <h1 class="auth-title">Lako</h1>
                        <p class="auth-subtitle">GPS Proximity Discovery</p>
                        <div id="login-error" class="error-message hidden"></div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="login-email" placeholder="you@example.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="login-password" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
                        <button class="btn btn-secondary" onclick="showRegister()">Create Account</button>
                    </div>
                </div>
            `;
        }

        function renderRegister() {
            return `
                <div class="auth-container">
                    <div class="auth-card">
                        <h1 class="auth-title">Sign Up</h1>
                        <p class="auth-subtitle">Create your account</p>
                        <div id="register-error" class="error-message hidden"></div>
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="register-name" placeholder="Juan Dela Cruz">
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="register-email" placeholder="you@example.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="register-password" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="handleRegister()">Sign Up</button>
                        <button class="btn btn-secondary" onclick="showLogin()">Back to Login</button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // AUTH HANDLERS
        // ============================================
        
        window.handleLogin = function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            saveUser({ id: 1, name: email.split('@')[0], email: email });
            render();
            getLocation();
        };

        window.handleRegister = function() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorDiv = document.getElementById('register-error');
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            saveUser({ id: 1, name: name, email: email });
            render();
            getLocation();
        };

        window.showLogin = function() {
            render();
        };

        window.showRegister = function() {
            const app = document.getElementById('app');
            app.innerHTML = renderRegister();
        };

        window.changePage = function(page) {
            currentPage = page;
            render();
            if (page === 'map') {
                setTimeout(() => {
                    if (mapInstance) {
                        mapInstance.invalidateSize();
                    } else {
                        renderMap();
                    }
                }, 100);
            }
        };

        // ============================================
        // MAIN RENDER
        // ============================================
        
        function render() {
            const app = document.getElementById('app');
            
            if (currentUser) {
                app.innerHTML = renderMainApp();
                if (currentPage === 'map') {
                    setTimeout(() => {
                        if (mapInstance) {
                            mapInstance.invalidateSize();
                        } else {
                            renderMap();
                        }
                    }, 100);
                }
            } else {
                app.innerHTML = renderLogin();
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        
        loadUser();
        render();
        if (currentUser) {
            getLocation();
        }
    </script>
</body>
</html>
